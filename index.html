<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>MIUO</title>
		<link rel="stylesheet" href="css/style.css" />
		<style>
			body,
			html {
				padding: 0;
				margin: 0;
				font-family: Arial, sans-serif;
				display: block;
			}

			.startwaves {
				position: fixed;
				display: flex;
				justify-content: center;
				height: 120vh;
				width: 100%;
				background-color: #469ce5;
				transform: translateY(-10vh);
				animation-name: down;
				animation-duration: 3s;
				animation-delay: 1s;
				animation-timing-function: ease-out;
				z-index: 999;
			}

			@keyframes down {
				0% {
					transform: translateY(-10vh);
				}

				100% {
					transform: translateY(110vh);
				}

			}

			.waves {
				display: block;
				position: absolute;
				bottom: 120vh;
				width: 100%;
			}

			#videobg {
				width: 100%;
				height: 100%;
			}

			.videos {
				width: 100%;
				height: 100%;
				object-fit: cover;
				position: absolute;
				object-position: center;
				-webkit-user-select: none;
				user-select: none;
				pointer-events: none;
			}

			#centertext {
				position: absolute;
				left: 50%;
				top: 50%;
				transform: translate(-50%, -50%);
				text-align: center;
				animation-name: out;
				animation-duration: 1.5s;
				animation-delay: 3s;
				animation-fill-mode: forwards; 
			}

			@keyframes out {
				100% {
					opacity: 0;
					display: none;
				}
			}
			@keyframes in {
				100% {
					opacity: 1;
				}
			}
			#p3relogo{
				position: absolute;
				right: 12%;
				top: 50%;
				opacity: 0;
				transform: translateY(-55%);
				animation-name: in;
				animation-duration: 1.5s;
				animation-delay: 5s;
				animation-iteration-count: 1;
				animation-fill-mode: forwards;
				width: 280px;
			}
			#miuo-footer {
				position: fixed;
				bottom: 30px;
				left: 0;
				right: 0;
				display: flex;
				justify-content: space-between;
				align-items: center;
				padding: 0 40px;
				opacity: 0;
				z-index: 100;
				animation-name: in;
				animation-duration: 1.5s;
				animation-delay: 6s;
				animation-fill-mode: forwards;
				pointer-events: none;
			}
			#miuo-footer a {
				pointer-events: auto;
			}
			.miuo-logo {
				font-size: 20px;
				font-weight: bold;
				color: rgba(255,255,255,0.8);
				letter-spacing: 4px;
				text-transform: uppercase;
			}
			.miuo-logo span {
				color: #469ce5;
			}
			.blog-link {
				font-size: 14px;
				color: rgba(255,255,255,0.6);
				text-decoration: none;
				letter-spacing: 2px;
				position: relative;
				overflow: hidden;
				display: inline-block;
			}
			.blog-link::after {
				content: '';
				position: absolute;
				top: -50%;
				left: -60%;
				width: 40%;
				height: 200%;
				background: linear-gradient(115deg, transparent, rgba(255,255,255,0.5), transparent);
				transform: skewX(-20deg);
				transition: none;
			}
			.blog-link:hover::after {
				left: 120%;
				transition: left 0.5s ease-in-out;
			}
			.blog-link:hover {
				color: #469ce5;
			}
			@media (max-width: 768px) {
				.videos {
					object-position: 8% center;
				}
				#centertext h1 {
					font-size: 24px;
				}
				#centertext p {
					font-size: 12px;
				}
				#p3relogo {
					left: 5%;
					right: auto;
					top: 5%;
					bottom: auto;
					transform: none;
					width: 240px;
				}
				#miuo-footer {
					padding: 0 20px;
					bottom: 15px;
				}
				.blog-link {
					font-size: 12px;
				}
				.waves img {
					width: 100%;
					height: auto;
				}
			}
			@media (max-width: 480px) {
				#centertext h1 {
					font-size: 20px;
				}
				#p3relogo {
					width: 200px;
					left: 4%;
					top: 4%;
				}
				.blog-link {
					font-size: 11px;
				}
			}
		</style>
	</head>
	<body>
		<div class="startwaves" id="downout">
			<div class="waves">
				<img src="img/waves/wave-1.svg" />
				<img src="img/waves/wave-2.svg" />
				<img src="img/waves/wave-3.svg" />
				<img src="img/waves/wave-4.svg" />
				<img src="img/waves/wave-5.svg" id="shape" />
			</div>
		</div>
		<div id="videobg">
			<video id="video2" class="videos" muted="muted" loop controlslist="nodownload" disablepictureinpicture oncontextmenu="return false;">
				<source src="assset/fv_movie2.mp4">
			</video>
			<video id="video1" class="videos" muted="muted" controlslist="nodownload" disablepictureinpicture oncontextmenu="return false;">
				<source src="assset/fv_movie1.mp4">
			</video>
			<div id="centertext">
				<h1>Memento Mori</h1>
				<p>Remember, You Will Die.<br />Time never waits.<br />It delivers all equally to the same end.</p>
			</div>
			<img id="p3relogo" src="img/MIUO.svg" alt="MIUO" />
		</div>
		<script>
			document.addEventListener('contextmenu', function(e) {
				if (e.target.tagName === 'VIDEO') e.preventDefault();
			});
			document.addEventListener('dragstart', function(e) {
				if (e.target.tagName === 'VIDEO') e.preventDefault();
			});
			var downwave = document.getElementById('downout');
			
			// 添加动画结束事件监听器
			downwave.addEventListener('animationend', function() {
				// 在动画结束后执行你的操作，比如改变元素属性
				downwave.style.display = 'none'
				var video1 = document.getElementById("video1");
				var video2 = document.getElementById("video2");
				video1.play();
				video1.addEventListener('ended', function() {
					// 在视频播放结束时执行你的操作
					// alert('视频播放结束！');
					video1.style.display = 'none'
					video2.play();
				});
			});
		</script>
		<div id="miuo-footer">
			<div></div>
			<a class="blog-link" href="https://blog.miuo.me" target="_blank">blog.miuo.me</a>
		</div>
	</body>
</html>
